source:
  - changed-files:
      - any-glob-to-any-file:
          - "src/**/*.py"

tests:
  - changed-files:
      - any-glob-to-any-file:
          - "tests/**"
          - "test_*.py"

docs:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"

ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"

docker:
  - changed-files:
      - any-glob-to-any-file:
          - "Dockerfile"
          - "docker-compose.yml"
          - ".dockerignore"

config:
  - changed-files:
      - any-glob-to-any-file:
          - "pyproject.toml"
          - ".env.example"
