name: PR Size

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  size-label:
    name: Size Label
    runs-on: ubuntu-latest
    steps:
      - uses: CodelyTV/pr-size-labeler@4ec67706cd878fbc1c8db0a5dcd28b6bb412e85a # v1.10.3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: "size/xs"
          xs_max_size: "50"
          s_label: "size/s"
          s_max_size: "150"
          m_label: "size/m"
          m_max_size: "400"
          l_label: "size/l"
          l_max_size: "800"
          xl_label: "size/xl"
          fail_if_xl: "false"
          files_to_ignore: |
            "uv.lock"
            "*.lock"
