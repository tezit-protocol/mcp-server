name: PR Size

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  size-label:
    name: Size Label
    runs-on: ubuntu-latest
    steps:
      - uses: CodelyTV/pr-size-labeler@095a41fca88b8764fd9e008ad269bcdb82bb38b9 # v1.10.4
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: "size/xs"
          xs_max_size: "50"
          s_label: "size/s"
          s_max_size: "150"
          m_label: "size/m"
          m_max_size: "400"
          l_label: "size/l"
          l_max_size: "800"
          xl_label: "size/xl"
          fail_if_xl: "false"
          files_to_ignore: |
            "uv.lock"
            "*.lock"
